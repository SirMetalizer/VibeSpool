name: Build VibeSpool Apps

on:
  release:
    types: [published]
  workflow_dispatch: # Erlaubt den manuellen Start über einen Button!

# WICHTIG: Erlaubt dem Bot, Dateien direkt ins Release hochzuladen
permissions:
  contents: write 

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install ZBar (nur macOS)
      if: matrix.os == 'macos-latest'
      run: brew install zbar

    - name: Pakete installieren
      run: |
        python -m pip install --upgrade pip
        # NEU in v1.10.0: pystray (System-Tray) und requests (Cloud API) hinzugefügt!
        pip install pillow qrcode pyinstaller paho-mqtt opencv-python pyzbar pystray requests

    - name: EXE bauen (Windows)
      if: matrix.os == 'windows-latest'
      # NEU: --hidden-import pystray hinzugefügt, damit das Tray-Icon beim Kompilieren nicht vergessen wird
      run: pyinstaller --noconsole --windowed --onefile --hidden-import cv2 --hidden-import pystray --collect-all pyzbar --icon="core/vibespool-icon.ico" --add-data "core/vibespool-icon.ico;core" --name "VibeSpool_Win" filament_gui.py

    - name: APP bauen und zippen (Mac)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconsole --windowed --hidden-import cv2 --hidden-import pystray --collect-all pyzbar --name "VibeSpool_Mac" filament_gui.py
        cd dist
        zip -r VibeSpool_Mac.zip VibeSpool_Mac.app

    - name: Windows EXE als Artifact sichern
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: VibeSpool-Windows
        path: dist/VibeSpool_Win.exe

    - name: Mac ZIP als Artifact sichern
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: VibeSpool-Mac
        path: dist/VibeSpool_Mac.zip

    # --- DIE MAGIE: AUTO-UPLOAD INS RELEASE ---
    - name: EXE an Release anhängen (Windows)
      if: github.event_name == 'release' && matrix.os == 'windows-latest'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/VibeSpool_Win.exe

    - name: ZIP an Release anhängen (Mac)
      if: github.event_name == 'release' && matrix.os == 'macos-latest'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/VibeSpool_Mac.zip
