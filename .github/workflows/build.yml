name: Build VibeSpool Apps

on:
  release:
    types: [published]
  workflow_dispatch: # Erlaubt den manuellen Start über einen Button!

permissions:
  contents: write 

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Code auschecken
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

    - name: Python einrichten
      uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f # v5.1.1
      with:
        python-version: '3.11'

    - name: Install ZBar (nur macOS)
      if: matrix.os == 'macos-latest'
      run: brew install zbar

    - name: Pakete installieren
      run: |
        python -m pip install --upgrade pip
        pip install pillow qrcode pyinstaller paho-mqtt opencv-python pyzbar pystray requests customtkinter

    - name: EXE bauen (Windows)
      if: matrix.os == 'windows-latest'
      # FIX: Alle Bilder (.png, .ico) aus dem core Ordner werden jetzt mit eingepackt!
      run: pyinstaller --noconsole --windowed --onefile --hidden-import cv2 --hidden-import pystray --collect-all pyzbar --icon="core/vibespool-icon.ico" --add-data "core/*.ico;core" --add-data "core/*.png;core" --name "VibeSpool_Win" filament_gui.py

    # --- NEU: ECHTER WINDOWS INSTALLER (Inno Setup) ---
    - name: Inno Setup Skript generieren (Windows)
      if: matrix.os == 'windows-latest'
      run: python generate_setup.py

    - name: Installer kompilieren (Windows)
      if: matrix.os == 'windows-latest'
      run: iscc setup.iss

    - name: APP bauen und zippen (Mac)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconsole --windowed --hidden-import cv2 --hidden-import pystray --collect-all pyzbar --name "VibeSpool_Mac" filament_gui.py
        cd dist
        zip -r VibeSpool_Mac.zip VibeSpool_Mac.app

    - name: Windows Setup als Artifact sichern
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
      with:
        name: VibeSpool-Windows-Setup
        path: dist/VibeSpool_Setup.exe

    - name: Mac ZIP als Artifact sichern
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
      with:
        name: VibeSpool-Mac
        path: dist/VibeSpool_Mac.zip

    # --- AUTO-UPLOAD INS RELEASE ---
    - name: Setup an Release anhängen (Windows)
      if: github.event_name == 'release' && matrix.os == 'windows-latest'
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
      with:
        files: dist/VibeSpool_Setup.exe

    - name: ZIP an Release anhängen (Mac)
      if: github.event_name == 'release' && matrix.os == 'macos-latest'
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
      with:
        files: dist/VibeSpool_Mac.zip