name: Build VibeSpool Apps

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Pakete installieren
      run: |
        python -m pip install --upgrade pip
        pip install pillow qrcode pyinstaller

    - name: EXE bauen (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --noconsole --windowed --onefile --name "VibeSpool_Win" filament_gui.py

    - name: APP bauen (Mac)
      if: matrix.os == 'macos-latest'
      run: pyinstaller --noconsole --windowed --name "VibeSpool_Mac" filament_gui.py

    - name: Dateien hochladen
      uses: actions/upload-artifact@v4
      with:
        name: VibeSpool-${{ matrix.os }}
        path: |
          dist/*.exe
          dist/*.app
