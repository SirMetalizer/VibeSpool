name: Build VibeSpool Apps

on:
  release:
    types: [published]
  workflow_dispatch: # Erlaubt den manuellen Start über einen Button!

permissions:
  contents: write 

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install ZBar (nur macOS)
      if: matrix.os == 'macos-latest'
      run: brew install zbar

    - name: Pakete installieren
      run: |
        python -m pip install --upgrade pip
        pip install pillow qrcode pyinstaller paho-mqtt opencv-python pyzbar pystray requests

    - name: EXE bauen (Windows)
      if: matrix.os == 'windows-latest'
      # FIX: Alle Bilder (.png, .ico) aus dem core Ordner werden jetzt mit eingepackt!
      run: pyinstaller --noconsole --windowed --onefile --hidden-import cv2 --hidden-import pystray --collect-all pyzbar --icon="core/vibespool-icon.ico" --add-data "core/*.ico;core" --add-data "core/*.png;core" --name "VibeSpool_Win" filament_gui.py

    # --- NEU: ECHTER WINDOWS INSTALLER (Inno Setup) ---
    - name: Inno Setup Skript generieren (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        echo "[Setup]" > setup.iss
        echo "AppName=VibeSpool" >> setup.iss
        echo "AppVersion=2.0.3" >> setup.iss
        echo "DefaultDirName={autopf}\VibeSpool" >> setup.iss
        echo "DefaultGroupName=VibeSpool" >> setup.iss
        echo "OutputDir=dist" >> setup.iss
        echo "OutputBaseFilename=VibeSpool_Setup_v2.0.3" >> setup.iss
        echo "SetupIconFile=core\vibespool-icon.ico" >> setup.iss
        echo "Compression=lzma2" >> setup.iss
        echo "SolidCompression=yes" >> setup.iss
        echo "PrivilegesRequired=lowest" >> setup.iss
        echo "[Files]" >> setup.iss
        echo "Source: ""dist\VibeSpool_Win.exe""; DestDir: ""{app}""; Flags: ignoreversion" >> setup.iss
        echo "[Icons]" >> setup.iss
        echo "Name: ""{group}\VibeSpool""; Filename: ""{app}\VibeSpool_Win.exe""" >> setup.iss
        echo "Name: ""{autodesktop}\VibeSpool""; Filename: ""{app}\VibeSpool_Win.exe""; Tasks: desktopicon" >> setup.iss
        echo "[Tasks]" >> setup.iss
        echo "Name: ""desktopicon""; Description: ""Desktop-Symbol erstellen""; GroupDescription: ""Zusatzliche Symbole:""" >> setup.iss

    - name: Installer kompilieren (Windows)
      if: matrix.os == 'windows-latest'
      run: iscc setup.iss

    - name: APP bauen und zippen (Mac)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconsole --windowed --hidden-import cv2 --hidden-import pystray --collect-all pyzbar --name "VibeSpool_Mac" filament_gui.py
        cd dist
        zip -r VibeSpool_Mac_v2.0.3.zip VibeSpool_Mac.app

    - name: Windows Setup als Artifact sichern
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: VibeSpool-Windows-Setup
        path: dist/VibeSpool_Setup_v2.0.3.exe

    - name: Mac ZIP als Artifact sichern
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: VibeSpool-Mac
        path: dist/VibeSpool_Mac_v2.0.3.zip

    # --- AUTO-UPLOAD INS RELEASE ---
    - name: Setup an Release anhängen (Windows)
      if: github.event_name == 'release' && matrix.os == 'windows-latest'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/VibeSpool_Setup_v2.0.3.exe

    - name: ZIP an Release anhängen (Mac)
      if: github.event_name == 'release' && matrix.os == 'macos-latest'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/VibeSpool_Mac_v2.0.3.zip