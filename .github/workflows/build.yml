name: Build VibeSpool Apps

on:
  release:
    types: [published]
  workflow_dispatch: # Erlaubt den manuellen Start über einen Button!

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4

    - name: Python einrichten
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Pakete installieren
      run: |
        python -m pip install --upgrade pip
        pip install pillow qrcode pyinstaller

    - name: EXE bauen (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --noconsole --windowed --onefile --name "VibeSpool_Win" filament_gui.py

    - name: APP bauen und zippen (Mac)
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconsole --windowed --name "VibeSpool_Mac" filament_gui.py
        cd dist
        zip -r VibeSpool_Mac.zip VibeSpool_Mac.app

    - name: Windows EXE hochladen
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: VibeSpool-Windows
        path: dist/VibeSpool_Win.exe

    - name: Mac ZIP hochladen
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: VibeSpool-Mac
        path: dist/VibeSpool_Mac.zip
